<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Mr. PokeCards</title>
  <link rel="stylesheet" href="css/styles.css?v=35">
</head>
<body>
  <header class="site-header"></header>

  <div class="container" style="padding:48px 20px 60px;max-width:620px">
    <h1 style="color:#fff;margin:0 0 6px">Contact Saxon</h1>
    <p style="color:var(--muted);margin:0 0 26px">Questions about a card, a trade, or an order? Send me a message and I'll get back to you. You can also just say hi!</p>

    <!-- Netlify form: submissions show in your Netlify dashboard under Forms -->
    <form id="contactForm" name="contact" method="POST"
          data-netlify="true" netlify-honeypot="bot-field" action="/contact.html?sent=1">
      <input type="hidden" name="form-name" value="contact">
      <p hidden><label>Don't fill this out: <input name="bot-field"></label></p>

      <div class="field">
        <label>Your name</label>
        <input type="text" name="name" placeholder="Ash Ketchum" required>
      </div>
      <div class="field">
        <label>Your email</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="field">
        <label>Subject</label>
        <select name="subject">
          <option>General question</option>
          <option>Question about a card</option>
          <option>Trade offer</option>
          <option>Order / shipping</option>
          <option>Newsletter signup</option>
        </select>
      </div>
      <div class="field">
        <label>Message <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <textarea name="message" rows="5" placeholder="Hi Saxon! I wanted to ask about..."></textarea>
      </div>

      <button type="submit" class="btn btn-gold btn-lg btn-block">Send message</button>
      <div id="contactMsg" style="margin-top:14px"></div>
    </form>
  </div>

  <footer class="site-footer"></footer>

  <script src="cards.js"></script>
  <script src="js/config.js?v=35"></script>
  <script src="js/store.js?v=35"></script>
  <script src="js/ui.js?v=35"></script>
  <script src="js/contact.js?v=35"></script>
</body>
</html>
