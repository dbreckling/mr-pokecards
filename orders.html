<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — Mr. PokeCards</title>
  <link rel="stylesheet" href="css/styles.css?v=35">
</head>
<body>
  <div id="adminGate" class="admin-gate">
    <div class="gate-box">
      <div class="gate-title">MR <span>PokeCards</span></div>
      <div class="gate-sub">Orders &middot; private</div>
      <input id="gatePw" type="password" placeholder="Password" autocomplete="current-password">
      <button id="gateBtn" class="btn btn-gold btn-block">Enter</button>
      <div id="gateErr" class="gate-err"></div>
    </div>
  </div>

  <header class="site-header"></header>

  <div class="wrap" style="max-width:900px">
    <div id="adminNav"></div>
    <div class="row-between" style="margin-bottom:8px">
      <h1 style="color:#fff;margin:0">Orders</h1>
    </div>
    <p class="note">Paid status comes straight from <b>Stripe</b> every time you open this page. Once an order shows <b>Paid</b>, mark it <b>Shipped</b> when it's in the mail. Refunds are done in Stripe, then reload here.</p>
    <div id="ordersList"></div>
  </div>

  <div id="printArea" class="print-area"></div>

  <script src="cards.js"></script>
  <script src="js/config.js?v=35"></script>
  <script src="js/store.js?v=35"></script>
  <script src="js/ui.js?v=35"></script>
  <script src="js/qrcode.min.js?v=35"></script>
  <script src="js/orders.js?v=35"></script>
</body>
</html>
